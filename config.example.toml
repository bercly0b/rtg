# RTG example configuration
# Copy this file to `~/.config/rtg/config.toml` and adjust values.
# Do not commit real secrets.

[logging]
# Tracing level: trace | debug | info | warn | error
# Note: trace/debug levels apply only to rtg; dependencies are limited to warn
level = "info"
# Maximum number of log files to keep (daily rotation)
max_log_files = 3

[telegram]
# Telegram app credentials from https://my.telegram.org
# Keep placeholder values in tracked config files.
api_id = 0
api_hash = "replace-me"

[voice]
# Override voice recording command. Use {file_path} as placeholder for the output path.
# The output must be Opus-encoded in an OGG container (mono audio channel).
# Default (macOS): ffmpeg -f avfoundation -i ':0' -c:a libopus -b:a 32k {file_path}
# Default (Linux):  ffmpeg -f alsa -i hw:0 -c:a libopus -b:a 32k {file_path}
# record_cmd = "ffmpeg -f avfoundation -i ':0' -c:a libopus -b:a 32k {file_path}"

[download]
# Maximum file size for auto-download. Files larger than this require
# manual download via Shift+D. Supports units: B, KB, MB, GB.
# max_auto_download_size = "10MB"

[open]
# MIME-type handlers for opening message files (mailcap-style).
# Use {file_path} as placeholder for the file path.
# Supports exact types ("audio/ogg") and wildcards ("audio/*").
# When no handler matches, the system default opener is used
# (macOS: `open`, Linux: `xdg-open`).
# "audio/ogg" = "mpv --speed=1.5 {file_path}"
# "audio/mpeg" = "mpv --no-video {file_path}"
# "audio/*" = "mpv {file_path}"

[keys]
# Override default key bindings. Keys are action names (snake_case),
# values are key patterns.
#
# Key pattern formats:
#   Single key:    "j", "?", "/"
#   Ctrl combo:    "Ctrl+C"
#   Key sequence:  "dd", "gg" (multiple characters = sequence)
#   Special keys:  "Enter", "Esc", "Backspace", "Delete", "Left", "Right", "Home", "End"
#
# Available actions (chat list context):
#   select_next_chat, select_previous_chat, open_chat, refresh_chat_list,
#   mark_chat_as_read, show_chat_info, search_chats
#
# Available actions (messages context):
#   scroll_to_next_message, scroll_to_previous_message, back_to_chat_list,
#   enter_message_input, reply_to_message, edit_message, copy_message_to_clipboard,
#   delete_message, open_message, open_link_in_browser, record_voice_message,
#   show_message_info, download_file, save_file_to_downloads
#
# Available actions (global):
#   quit, show_help
#
# Examples:
# select_next_chat = "n"
# select_previous_chat = "p"
# delete_message = "xx"
# quit = "Q"

