name: Quality Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Repository checkout
        uses: actions/checkout@v4

      - name: Install TDLib runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libc++-dev libc++abi-dev

      - name: Rust env bootstrap (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache (registry + target)
        uses: Swatinem/rust-cache@v2

      - name: Gate 1 — cargo fmt --check
        run: cargo fmt --check

      - name: Gate 2 — cargo clippy -- -D warnings
        run: cargo clippy -- -D warnings

      - name: Gate 3 — cargo test
        run: cargo test

      - name: Gate 4 — cargo check
        run: cargo check

  coverage:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Repository checkout
        uses: actions/checkout@v4

      - name: Install TDLib runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libc++-dev libc++abi-dev

      - name: Rust env bootstrap (stable + llvm-tools)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cargo cache (registry + target)
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate PR branch coverage
        run: cargo llvm-cov --no-fail-fast --json --summary-only --output-path pr-coverage.json

      - name: Clean profiling data
        run: cargo llvm-cov clean --workspace

      - name: Generate main branch coverage
        run: |
          git fetch origin main
          git checkout origin/main
          cargo llvm-cov --no-fail-fast --json --summary-only --output-path main-coverage.json
          git checkout -

      - name: Build coverage report
        id: coverage
        run: |
          PR_LINES=$(jq '.data[0].totals.lines.percent' pr-coverage.json)
          PR_FUNCS=$(jq '.data[0].totals.functions.percent' pr-coverage.json)
          PR_REGIONS=$(jq '.data[0].totals.regions.percent' pr-coverage.json)
          PR_LINES_COVERED=$(jq '.data[0].totals.lines.covered' pr-coverage.json)
          PR_LINES_TOTAL=$(jq '.data[0].totals.lines.count' pr-coverage.json)

          MAIN_LINES=$(jq '.data[0].totals.lines.percent' main-coverage.json)
          MAIN_FUNCS=$(jq '.data[0].totals.functions.percent' main-coverage.json)
          MAIN_REGIONS=$(jq '.data[0].totals.regions.percent' main-coverage.json)

          fmt_delta() {
            local delta
            delta=$(awk "BEGIN {printf \"%.2f\", $1 - $2}")
            if awk "BEGIN {exit !($1 > $2 + 0.005)}"; then
              echo "+${delta}% ↑"
            elif awk "BEGIN {exit !($2 > $1 + 0.005)}"; then
              echo "${delta}% ↓"
            else
              echo "0.00%"
            fi
          }

          DELTA_LINES=$(fmt_delta "$PR_LINES" "$MAIN_LINES")
          DELTA_FUNCS=$(fmt_delta "$PR_FUNCS" "$MAIN_FUNCS")
          DELTA_REGIONS=$(fmt_delta "$PR_REGIONS" "$MAIN_REGIONS")

          FMT_PR_LINES=$(awk "BEGIN {printf \"%.2f\", $PR_LINES}")
          FMT_PR_FUNCS=$(awk "BEGIN {printf \"%.2f\", $PR_FUNCS}")
          FMT_PR_REGIONS=$(awk "BEGIN {printf \"%.2f\", $PR_REGIONS}")
          FMT_MAIN_LINES=$(awk "BEGIN {printf \"%.2f\", $MAIN_LINES}")
          FMT_MAIN_FUNCS=$(awk "BEGIN {printf \"%.2f\", $MAIN_FUNCS}")
          FMT_MAIN_REGIONS=$(awk "BEGIN {printf \"%.2f\", $MAIN_REGIONS}")

          {
            echo 'REPORT<<EOF'
            echo "## Test Coverage Report"
            echo ""
            echo "| Metric | \`main\` | PR | Delta |"
            echo "|--------|--------|-----|-------|"
            echo "| Lines | ${FMT_MAIN_LINES}% | ${FMT_PR_LINES}% | ${DELTA_LINES} |"
            echo "| Functions | ${FMT_MAIN_FUNCS}% | ${FMT_PR_FUNCS}% | ${DELTA_FUNCS} |"
            echo "| Regions | ${FMT_MAIN_REGIONS}% | ${FMT_PR_REGIONS}% | ${DELTA_REGIONS} |"
            echo ""
            echo "**Lines covered:** ${PR_LINES_COVERED} / ${PR_LINES_TOTAL}"
            echo ""
            echo "> Compared against \`main\` branch"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post coverage comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-report
          message: |
            ${{ steps.coverage.outputs.REPORT }}
